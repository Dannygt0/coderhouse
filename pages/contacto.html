<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">RedZone <span class="text-primary">.</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto text-center">
                <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="#features">Funciones</a></li>
                <li class="nav-item"><a class="nav-link" href="#precios">Precios</a></li>
                <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-3" href="#">Descargar</a></li>
            </ul>
        </div>
    </div>
</nav>
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 custom-form-container">
            <h2 class="mb-4">Escríbenos</h2>
            <form>
                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" class="form-control custom-input" placeholder="Tu nombre">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control custom-input" placeholder="nombre@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mensaje</label>
                    <textarea class="form-control custom-input" rows="5"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Enviar Mensaje</button>
            </form>
        </div>
    </div>
</section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
